services:
  - type: web
    name: shl-recommender
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false        # set manually in Render dashboard
      - key: LOG_LEVEL
        value: INFO
      - key: RETRIEVAL_BACKEND
        value: tfidf       # use tfidf on Render free tier (no persistent storage for model cache)
